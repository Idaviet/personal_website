        <!-- 3Dmol.js - lighter, more reliable alternative -->
        <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
        
        <script>
            let viewer;
            let currentPdb = '6vsb';
            
            function changeStyle(style) {
                viewer.removeAllSurfaces();
                viewer.setStyle({}, {});
                
                if (style === 'cartoon') {
                    viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
                } else if (style === 'stick') {
                    viewer.setStyle({}, {stick: {color: 'spectrum', radius: 0.15}});
                } else if (style === 'sphere') {
                    viewer.setStyle({}, {sphere: {color: 'spectrum', scale: 1.0}});
                } else if (style === 'line') {
                    viewer.setStyle({}, {line: {color: 'spectrum'}});
                } else if (style === 'surface') {
                    viewer.setStyle({}, {cartoon: {color: 'spectrum', opacity: 0.3}});
                    viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity: 0.8, color: 'spectrum'});
                } else if (style === 'ribbon') {
                    viewer.setStyle({}, {cartoon: {color: 'spectrum', style: 'trace', thickness: 0.3}});
                }
                viewer.render();
            }
            
            function initViewer(pdbId) {
                document.getElementById('protein-viewer').innerHTML = '';
                document.getElementById('pdb-go').addEventListener('click', function() {
                    const pdbId = document.getElementById('pdb-input').value.trim();
                    if (pdbId) {
                        initViewer(pdbId);
                    }
                });
                document.getElementById('pdb-input').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const pdbId = this.value.trim();
                        if (pdbId) initViewer(pdbId);
                    }
                });
                viewer = $3Dmol.createViewer('protein-viewer', {
                    backgroundColor: '0x1a1a2e',
                });
                $3Dmol.download('pdb:' + pdbId, viewer, function() {
                    viewer.clear(); 
                    viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
                    viewer.zoomTo();
                    viewer.render();
                    viewer.zoom(1.2);
                });
                setTimeout(() => {
                    viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
                    viewer.render();
                }, 1000);
            }
            
            initViewer(currentPdb);


            
            document.getElementById('pdb-select').addEventListener('change', function() {
                initViewer(this.value);
            });
        </script>

        <script>
            document.getElementById('run-analysis').addEventListener('click', async function() {
                const fileInput = document.getElementById('epitope-file');
                const statusDiv = document.getElementById('analysis-status');
                const statusText = document.getElementById('status-text');
                const resultsContainer = document.getElementById('results-container');
                const errorDiv = document.getElementById('analysis-error');
                
                // Validate
                if (!fileInput.files.length) {
                    errorDiv.textContent = 'Please upload an epitope CSV file.';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                // Show loading
                errorDiv.style.display = 'none';
                resultsContainer.style.display = 'none';
                statusDiv.style.display = 'block';
                statusText.textContent = 'Running epitope analysis...';
                
                // Build form data
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('start_pos', document.getElementById('start-pos').value || '');
                formData.append('end_pos', document.getElementById('end-pos').value || '');
                formData.append('ag_seq', document.getElementById('ag-seq').value);
                
                try {
                    const response = await fetch('http://localhost:5000/analyze', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Unknown error');
                    }
                    
                    // Display results
                    statusDiv.style.display = 'none';
                    resultsContainer.style.display = 'block';
                    
                    // Summary stats
                    document.getElementById('summary-stats').innerHTML = `
                        <span class="badge bg-primary me-2">Positions: ${data.summary.total_positions}</span>
                        <span class="badge bg-success me-2">Epitopes: ${data.summary.total_epitopes}</span>
                        <span class="badge bg-info">Range: ${data.summary.start_pos || 'N/A'} - ${data.summary.end_pos || 'N/A'}</span>
                    `;
                    
                    // Populate table
                    const tbody = document.getElementById('results-body');
                    tbody.innerHTML = '';
                    data.plot_df.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${row.pos}</td>
                                <td><code>${row.aa}</code></td>
                                <td>${row.count}</td>
                            </tr>
                        `;
                    });
                    
                } catch (err) {
                    statusDiv.style.display = 'none';
                    errorDiv.textContent = 'Error: ' + err.message;
                    errorDiv.style.display = 'block';
                }
            });
        </script>
