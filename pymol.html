<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Isaac G.L. Daviet - Protein Viewer</title>
        <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
        <!-- Font Awesome -->
        <script src="https://use.fontawesome.com/releases/v7.0.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts -->
        <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS -->
        <link href="css/styles.css" rel="stylesheet" />
        
        <style>
            #protein-viewer {
                width: 100%;
                height: 600px;
                border-radius: 8px;
                overflow: hidden;
                position: relative;
                background: #1a1a2e;
            }
        </style>
    </head>
    <body id="page-top">
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" id="sideNav">
            <a class="navbar-brand js-scroll-trigger" href="index.html">
                <span class="d-block d-lg-none">Isaac Daviet</span>
                <span class="d-none d-lg-block"><img class="img-fluid img-profile rounded-circle mx-auto mb-2" src="assets/img/profile.jpg" alt="..." /></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="photos.html">Photos</a></li>
                    <li class="nav-item"><a class="nav-link" href="pymol.html">Protein Viewer</a></li>
                </ul>
            </div>
        </nav>
        
        <!-- Page Content -->
        <div class="container-fluid p-0">
            <section class="resume-section" id="protein-viewer-section">
                <div class="resume-section-content">
                    <h2 class="mb-5">Protein Viewer</h2>
                    
                    <div id="protein-viewer"></div>
                    
                    <div class="mt-4">
                        <p class="text-muted small">
                            <b>PDB ID:</b> <select id="pdb-select" class="form-select d-inline-block w-auto ms-2">
                                <option value="1ubq">1UBQ - Ubiquitin</option>
                                <option value="4hhb">4HHB - Hemoglobin</option>
                                <option value="1aoi">1AOI - HIV-1 Protease</option>
                                <option value="2lyz">2LYZ - Lysozyme</option>
                                <option value="1crn">1CRN - Crambin</option>
                            </select>
                        </p>
                        <p class="small text-muted">Click and drag to rotate. Scroll to zoom. Right-click to pan.</p>
                    </div>
                </div>
            </section>
        </div>
        
        <!-- Bootstrap core JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS -->
        <script src="js/scripts.js"></script>
        
        <!-- 3Dmol.js - lighter, more reliable alternative -->
        <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
        
        <script>
            let viewer;
            let currentPdb = '1ubq';
            
            function initViewer(pdbId) {
                // Clear previous viewer
                document.getElementById('protein-viewer').innerHTML = '';
                
                // Create viewer
                viewer = $3Dmol.createViewer('protein-viewer', {
                    backgroundColor: '0x1a1a2e',
                });
                
                // Download and load PDB
                $3Dmol.download('pdb:' + pdbId, viewer, function() {
                    viewer.setStyle({}, {line: {color: 'ss'}});
                    viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity: 1, color: 'white'});
                    viewer.zoomTo();
                    viewer.render();
                    viewer.zoom(1.2);
                });
            }
            
            // Initialize on page load
            initViewer(currentPdb);
            
            // Handle dropdown changes
            document.getElementById('pdb-select').addEventListener('change', function() {
                initViewer(this.value);
            });
        </script>
    </body>
</html>
