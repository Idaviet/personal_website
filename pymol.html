        <script>
            let viewer;
            let currentPdb = '6vsb';
            let style_hold = 'cartoon';
            
            function changeStyle(style, colr) {
                viewer.removeAllSurfaces();
                let start = parseInt(document.getElementById('start-pos').value);
                let end = parseInt(document.getElementById('end-pos').value);

                if (!start) start =1
                if (!end) end = 9999999
                if (!colr) colr = '#033dfc'
                const sel = (start && end) ? {resi: start + '-' + end} : {};
                style_hold = style

                if (style === 'cartoon') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {cartoon: {color: colr}});
                } else if (style === 'stick') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {stick: {color: colr, radius: 0.15}});
                } else if (style === 'sphere') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {sphere: {color: colr, scale: 1.0}});
                } else if (style === 'line') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {line: {color: colr}});
                } else if (style === 'surface') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {cartoon: {color: colr, opacity: 0}});
                    viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity: 0.99, color: colr}, sel);
                } else if (style === 'ribbon') {
                    viewer.setStyle({}, {invisible: true})
                    viewer.setStyle(sel, {cartoon: {color: colr, style: 'trace', thickness: 0.3}});
                }
                viewer.render();

                // return
            }

            function initViewer(pdbId) {
                document.getElementById('protein-viewer').innerHTML = '';
                
                viewer = $3Dmol.createViewer('protein-viewer', {
                    backgroundColor: 'white',
                });
                
                $3Dmol.download('pdb:' + pdbId, viewer, function() {
                    viewer.clear();
                    viewer.setStyle({}, {cartoon: {color: '#033dfc'}});
                    viewer.zoomTo();
                    viewer.render();
                    viewer.zoom(1.2);
                    
                    // Apply start/end range after load
                    applyRange();
                });
            }

            initViewer(currentPdb);

            setTimeout(() => {
                viewer.setStyle({}, {cartoon: {color: '#033dfc'}});
                viewer.render();
            }, 1000);


            document.getElementById('pdb-go').addEventListener('click', function() {
                const pdbId = document.getElementById('pdb-input').value.trim();
                if (pdbId) initViewer(pdbId);
                setTimeout(() => {
                    viewer.setStyle(sel, {cartoon: {color: '#033dfc'}});
                    viewer.render();
                    }, 1000);
            });

            document.getElementById('pdb-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const pdbId = this.value.trim();
                    if (pdbId) initViewer(pdbId);
                    setTimeout(() => {
                        viewer.setStyle(sel, {cartoon: {color: '#033dfc'}});
                        viewer.render();
                        }, 1000);
                    }
            });

            document.getElementById('start-pos').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    changeStyle(style_hold);
                    }
            });

            document.getElementById('end-pos').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    changeStyle(style_hold);
                    }
            });

        </script>

        <script>
            // Amino acid one-letter to three-letter code mapping
            const aa1to3 = {
                'A':'ALA','C':'CYS','D':'ASP','E':'GLU','F':'PHE',
                'G':'GLY','H':'HIS','I':'ILE','K':'LYS','L':'LEU',
                'M':'MET','N':'ASN','P':'PRO','Q':'GLN','R':'ARG',
                'S':'SER','T':'THR','V':'VAL','W':'TRP','Y':'TYR'
            };

            function parseCSV(file, callback) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const rows = text.split('\n');
                    const headers = rows[0].split(',');
                    const epitopeColIndex = headers.findIndex(h => 
                        h.trim().replace(/"/g,'') === 'Epitope - Name');
                    
                    const residues = [];
                    for (let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',');
                        const epitopeStr = cols[epitopeColIndex];
                        if (!epitopeStr) continue;
                        
                        // Parse "G446, Y449" style strings
                        const matches = epitopeStr.matchAll(/([A-Z])(\d+)/g);
                        for (const match of matches) {
                            residues.push({aa: match[1], pos: parseInt(match[2])});
                        }
                    }
                    callback(residues);
                };
                reader.readAsText(file);
            }

            function highlightAllEpitopes(residues, only_in_selection) {
                // const seq = document.getElementById('ag-seq').value.trim();
                let highlights_on = 'true';

                const start = parseInt(document.getElementById('start-pos').value) || 1;
                const end = parseInt(document.getElementById('end-pos').value) || 999999;
                
                // Validate against sequence if provided
                let validResidues = residues;
                // if (seq) {
                //     validResidues = residues.filter(r => {
                //         if (r.pos < 1 || r.pos > seq.length) return false;
                //         return seq[r.pos - 1].toUpperCase() === r.aa.toUpperCase();
                //     });
                // }
                
                // Deduplicate by position
                const seen = new Set();
                const unique = validResidues.filter(r => {
                    const key = r.aa + '-' + r.pos;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
                
                // Apply to viewer
                unique.forEach(r => {
                    const aa3 = aa1to3[r.aa.toUpperCase()] || 'UNK';
                    const sel = {resi: r.pos, resn: aa3};
                    
                    // Skip residues outside selection
                    if (only_in_selection === true && (r.pos < start || r.pos > end)) return;

                    if (style_hold === 'surface') {
                        viewer.setStyle(sel, {cartoon: {color: '#fca903', opacity: 0}});
                        viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity: 0.99, color: '#fca903'}, sel);
                    } else if (style_hold === "ribbon"){
                        viewer.setStyle(sel, {cartoon: {color: '#fca903', style: 'trace', thickness: 0.3}});
                    } else {viewer.setStyle(sel, {[style_hold]: {color: '#fca903', scale: 1, opacity: 1}});}
                });

                // For non-surface modes, hide residues outside selection
                if (only_in_selection === true && style_hold !== 'surface') {
                    viewer.setStyle({resi: '0-' + (start - 1)}, {invisible: true});
                    viewer.setStyle({resi: (end + 1) + '-999999'}, {invisible: true});
                }

                viewer.render();                
                // Show summary
                // alert(`Highlighted ${style_hold} unique epitope residues on the structure.`);
            }

            // epitope highlight buttons
            document.getElementById('highlight-all-epitopes').addEventListener('click', function() {
                const fileInput = document.getElementById('epitope-file');
                if (!fileInput.files.length) {
                    alert('Please upload an epitope CSV file first.');
                    return;
                }
                let highlights_on = 'true'
                parseCSV(fileInput.files[0], function(residues) {
                    highlightAllEpitopes(residues);
                });
            });

            document.getElementById('highlight-epitopes-in-sel').addEventListener('click', function() {
                const fileInput = document.getElementById('epitope-file');
                if (!fileInput.files.length) {
                    alert('Please upload an epitope CSV file first.');
                    return;
                }
                let highlights_on = 'true'
                parseCSV(fileInput.files[0], function(residues) {
                    highlightAllEpitopes(residues, true);
                });
            });

            document.getElementById('clear-epitopes').addEventListener('click', function() {
                changeStyle(style_hold);
                highlights_on = 'false';  // reapply current style to clear highlights
            });


        </script>
